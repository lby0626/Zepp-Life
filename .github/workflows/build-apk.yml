name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          cp -r static www/
          cp -r tutorial www/

      - name: Generate app icons
        run: npx capacitor-assets generate --iconBackgroundColor "#E11D48"

      - name: Init Capacitor Android
        run: npx cap add android

      - name: Copy icon to web assets
        run: cp icon.png www/

      - name: Sync web assets
        run: npx cap sync

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Y子步数
          path: android/app/build/outputs/apk/debug/*.apk
